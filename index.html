<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111111">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="shortcut icon" href="icon.png" type="image/png">
    <link rel="canonical" href="https://a13ks3y.github.io/mtg/">
    <link rel="manifest" href="/mtg/manifest.webmanifest" crossorigin="use-credentials">
    <title>Match Three Game</title>
    <style>
        html, body {
            font-size: 16px;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            position: fixed;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        }
        canvas.level-transition {
            opacity: 0;
            transform: scale(0.95) translateY(10px);
        }
        #audioToggle {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid white;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            user-select: none;
        }
    </style>
</head>
<body>
    <button id="audioToggle">🔈</button>
    <canvas id="ctx"></canvas>
    <script src="audio.js" charset="UTF-8"></script>
    <script src="gem.js" charset="UTF-8"></script>
    <script src="cell.js" charset="UTF-8"></script>
    <script src="grid.js" charset="UTF-8"></script>
    <script src="index.js" charset="UTF-8"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/mtg/sw.js', {scope: '/mtg/'});
            });
        }
    </script>
</body>
</html>
